name: CI

# push / PR で 型チェック → ユニットテスト → 本番ビルド を検証する。
# このリポには lint / typecheck の npm script がないため、型チェックは npx tsc --noEmit を直接実行する。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 PR の古い実行はキャンセルして Actions 分数を節約
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest # Windows($0.010/分)ではなく Linux($0.006/分)固定
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
